<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 2 - Interactive To-Do List</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 20px;
      background-color: #f5f5f5;
    }

    h1 {
      color: #0d0d0d;
      margin-bottom: 6px;
    }

    /* Task counter display */
    #task-count {
      font-size: 14px;
      color: #e63946;
      font-weight: bold;
      margin-bottom: 20px;
    }

    /* Input and button side by side */
    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    #task-input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ddd;
      outline: none;
    }

    #task-input:focus {
      border-color: #e63946;
    }

    #add-button {
      background-color: #e63946;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    #add-button:hover {
      background-color: #c0392b;
    }

    /* The list itself */
    #task-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    /* Each list item */
    .task-item {
      background-color: white;
      border: 1px solid #ddd;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    /* Completed task styling - toggled by JavaScript */
    .completed {
      text-decoration: line-through;
      color: #aaa;
      background-color: #f9f9f9;
    }

    /* Delete button inside each task */
    .delete-button {
      background-color: #0d0d0d;
      color: white;
      border: none;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      margin-left: 10px;
    }

    .delete-button:hover {
      background-color: #e63946;
    }

    .task-text {
      flex: 1;
    }
  </style>
</head>

<body>

  <h1>My To-Do List</h1>

  <!-- BONUS: Task counter -->
  <p id="task-count">Total Tasks: 0</p>

  <!-- Input area -->
  <div class="input-area">
    <input type="text" id="task-input" placeholder="Enter a new task..." />
    <button id="add-button">Add</button>
  </div>

  <!-- Empty list - JavaScript will fill this -->
  <ul id="task-list"></ul>


  <script>


    // BONUS CHALLENGE - Store tasks in an array included
    let tasksArray = [];


    
    // Select all the elements we need
    let taskInput = document.getElementById("task-input");
    let addButton = document.getElementById("add-button");
    let taskList = document.getElementById("task-list");
    let taskCount = document.getElementById("task-count");



    // Function to update the task counter
    function updateCount() {
      taskCount.textContent = "Total Tasks: " + tasksArray.length;
    }


    // Function to ADD a new task when Add is clicked
    function addTask() {

      // Get what the user typed
      let taskText = taskInput.value;

      // If the input is empty, do nothing
      if (taskText === "") {
        alert("Please enter a task first!");
        return;
      }

      // BONUS: Add the task to the array
      tasksArray.push(taskText);

      // Create a new list item element
      let listItem = document.createElement("li");
      listItem.classList.add("task-item");

      // Create the task text span
      let taskSpan = document.createElement("span");
      taskSpan.textContent = taskText;
      taskSpan.classList.add("task-text");

      // Clicking the task text toggles it as completed
      taskSpan.addEventListener("click", function() {
        listItem.classList.toggle("completed");
      });

      // Create the Delete button for this task
      let deleteButton = document.createElement("button");
      deleteButton.textContent = "Delete";
      deleteButton.classList.add("delete-button");

      // When delete is clicked, remove the task
      deleteButton.addEventListener("click", function() {

        // Remove from the array
        let index = tasksArray.indexOf(taskText);
        tasksArray.splice(index, 1);

        // Remove from the page
        taskList.removeChild(listItem);

        // Update the counter
        updateCount();

        console.log("Task deleted:", taskText);
        console.log("Tasks remaining:", tasksArray);
      });

      // Put the text and button inside the list item
      listItem.appendChild(taskSpan);
      listItem.appendChild(deleteButton);

      // Add the list item to the task list on the page
      taskList.appendChild(listItem);

      // Log to console
      console.log("Task added:", taskText);
      console.log("All tasks:", tasksArray);

      // Clear the input box
      taskInput.value = "";

      // Update the task counter
      updateCount();
    }


    
    // Listen for the Add button click
    addButton.addEventListener("click", addTask);



    // Also allow pressing Enter to add a task
    taskInput.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        addTask();
      }
    });

  </script>

</body>

</html>
